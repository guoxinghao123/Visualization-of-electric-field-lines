<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>等量电荷电场线示意图</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 15px; /* 移动端适当减小内边距 */
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
            text-align: center;
            font-size: 24px; /* 移动端标题稍作调整 */
        }
        .hint {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .controls {
            margin-bottom: 20px;
            /* 【修改2】让按钮在手机屏幕较窄时可以自动换行居中 */
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px; 
        }
        button {
            padding: 10px 15px;
            margin: 0; /* 配合 gap 属性使用 */
            font-size: 15px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s;
            /* 防止按钮上的文字被长按选中 */
            user-select: none; 
            -webkit-user-select: none; 
        }
        button:hover {
            background-color: #0056b3;
        }
        button.active {
            background-color: #28a745;
        }
        canvas {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(26, 24, 24, 0.1);
            cursor: default;
            
            /* 【修改3】核心响应式适配，限制最大宽度为 100%，高度自动按比例缩放 */
            max-width: 100%;
            height: auto;
            
            /* 防止触摸画布时触发系统自带的滑动返回或下拉刷新 */
            touch-action: none; 
        }
        .footer {
            margin-top: 30px; 
            margin-bottom: 10px;
            text-align: center;
        }
        .footer a {
            color: #007bff;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 20px;
            border: 2px solid #007bff;
            border-radius: 20px;
            transition: all 0.3s ease;
            display: inline-block; /* 保证 padding 在移动端正常显示 */
        }
        .footer a:hover {
            background-color: #007bff;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
        }
        h5 {
            margin-top: 10px;
        }
        h5 a {
            color: #555;
            text-decoration: none;
        }
        h5 a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>等量电荷电场线演示</h1>
    <div class="hint">💡 提示：可使用鼠标或<b>手指长按滑动</b>左右拖拽电荷。</div>
    
    <div class="controls">
        <button id="btn-dipole" class="active" onclick="setMode('dipole')">正负点电荷</button>
        <button id="btn-pospos" onclick="setMode('pospos')">正正点电荷</button>
        <button id="btn-negneg" onclick="setMode('negneg')">负负点电荷</button>
    </div>

    <canvas id="simCanvas" width="800" height="500"></canvas>
    
    <div class="footer">
        <a href="https://github.com/guoxinghao123/Visualization-of-electric-field-lines" target="_blank">点击查看本页源代码</a>
    </div>
    <h5>
        <a href="https://github.com/guoxinghao123" target="_blank">@guoxinghao123</a>
    </h5>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        const chargeDist = 200; 
        const k = 10000; 
        const stepSize = 3; 
        const numLines = 24; 
        const chargeRadius = 15; 

        let mode = 'dipole'; 
        let q1 = { x: width/2 - chargeDist/2, y: height/2, q: 1 };
        let q2 = { x: width/2 + chargeDist/2, y: height/2, q: -1 };
        
        let draggingElement = null; 

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            
            if (mode === 'dipole') {
                q1.q = 1; q2.q = -1;
                document.getElementById('btn-dipole').classList.add('active');
            } else if (mode === 'pospos') {
                q1.q = 1; q2.q = 1;
                document.getElementById('btn-pospos').classList.add('active');
            } else if (mode === 'negneg') {
                q1.q = -1; q2.q = -1;
                document.getElementById('btn-negneg').classList.add('active');
            }
            draw();
        }

        function getE(x, y) {
            let Ex = 0;
            let Ey = 0;
            const charges = [q1, q2];

            for (let c of charges) {
                let dx = x - c.x;
                let dy = y - c.y;
                let r2 = dx*dx + dy*dy;
                if (r2 < 1) r2 = 1; 
                let r = Math.sqrt(r2);
                let E = (k * c.q) / r2;
                Ex += E * (dx / r);
                Ey += E * (dy / r);
            }
            return { Ex, Ey };
        }

        function drawArrow(x, y, Ex, Ey, color) {
            const angle = Math.atan2(Ey, Ex);
            const arrowLen = 10;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - arrowLen * Math.cos(angle - Math.PI / 6), y - arrowLen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x - arrowLen * Math.cos(angle + Math.PI / 6), y - arrowLen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawFieldLines() {
            ctx.strokeStyle = "#999999"; 
            ctx.lineWidth = 1.5;

            const charges = [q1, q2];
            
            for (let c of charges) {
                let reverse = (c.q < 0);

                for (let i = 0; i < numLines; i++) {
                    let angle = (i * 2 * Math.PI) / numLines;
                    let x = c.x + Math.cos(angle) * 10; 
                    let y = c.y + Math.sin(angle) * 10;

                    ctx.beginPath();
                    ctx.moveTo(x, y);

                    let stepCount = 0;
                    let arrowDrawn = false;

                    while (x > 0 && x < width && y > 0 && y < height && stepCount < 1500) {
                        let { Ex, Ey } = getE(x, y);
                        let E_mag = Math.sqrt(Ex*Ex + Ey*Ey);
                        
                        let dx = (Ex / E_mag) * stepSize;
                        let dy = (Ey / E_mag) * stepSize;

                        if (reverse) {
                            dx = -dx;
                            dy = -dy;
                        }

                        x += dx;
                        y += dy;
                        ctx.lineTo(x, y);

                        let hitCharge = false;
                        for (let other_c of charges) {
                            if (c !== other_c) { 
                                let dist = Math.sqrt((x - other_c.x)**2 + (y - other_c.y)**2);
                                if (dist < chargeRadius) { hitCharge = true; break; }
                            }
                        }
                        if (hitCharge) break;

                        if (stepCount === 40 && !arrowDrawn) {
                            ctx.stroke(); 
                            drawArrow(x, y, Ex, Ey, "#999999");
                            ctx.beginPath();
                            ctx.moveTo(x, y);
                            arrowDrawn = true;
                        }

                        stepCount++;
                    }
                    ctx.stroke();
                }
            }
        }

        function drawCharge(c) {
            ctx.beginPath();
            ctx.arc(c.x, c.y, chargeRadius, 0, 2 * Math.PI);
            ctx.fillStyle = c.q > 0 ? "#ff4d4d" : "#4da6ff";
            ctx.fill();
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(c.q > 0 ? "+" : "-", c.x, c.y + 2);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            drawFieldLines();
            drawCharge(q1);
            drawCharge(q2);
        }

        // --- 【修改4】统一的鼠标与触摸交互事件 ---

        function getEventPos(evt) {
            const rect = canvas.getBoundingClientRect();
            // 因为在手机上画布可能被 CSS 缩放，所以我们要计算缩放比例
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let clientX, clientY;

            // 判断是触摸事件还是鼠标事件
            if (evt.touches && evt.touches.length > 0) {
                clientX = evt.touches[0].clientX;
                clientY = evt.touches[0].clientY;
            } else if (evt.changedTouches && evt.changedTouches.length > 0) {
                // 用于 touchend 事件获取最后一次触摸的位置
                clientX = evt.changedTouches[0].clientX;
                clientY = evt.changedTouches[0].clientY;
            } else {
                clientX = evt.clientX;
                clientY = evt.clientY;
            }

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function handleStart(evt) {
            evt.preventDefault(); // 阻止移动端按压时页面滚动
            const pos = getEventPos(evt);
            const hitbox = chargeRadius + 20; // 胖手指优化：触摸判定区域扩大至 20 像素

            if (Math.hypot(pos.x - q1.x, pos.y - q1.y) < hitbox) {
                draggingElement = q1;
                canvas.style.cursor = 'grabbing';
            } else if (Math.hypot(pos.x - q2.x, pos.y - q2.y) < hitbox) {
                draggingElement = q2;
                canvas.style.cursor = 'grabbing';
            }
        }

        function handleMove(evt) {
            evt.preventDefault(); // 阻止移动端拖拽时页面滑动
            const pos = getEventPos(evt);

            if (draggingElement) {
                let newX = pos.x;
                // 限制边界，防止拖出画布
                if (newX < chargeRadius) newX = chargeRadius;
                if (newX > width - chargeRadius) newX = width - chargeRadius;
                
                draggingElement.x = newX;
                requestAnimationFrame(draw); 
            } else if (!evt.touches) { // 仅针对鼠标悬停改变指针状态
                const hitbox = chargeRadius + 10;
                if (Math.hypot(pos.x - q1.x, pos.y - q1.y) < hitbox || 
                    Math.hypot(pos.x - q2.x, pos.y - q2.y) < hitbox) {
                    canvas.style.cursor = 'grab';
                } else {
                    canvas.style.cursor = 'default';
                }
            }
        }

        function handleEnd(evt) {
            evt.preventDefault();
            draggingElement = null;
            canvas.style.cursor = 'default';
        }

        // 绑定鼠标事件
        canvas.addEventListener('mousedown', handleStart, { passive: false });
        canvas.addEventListener('mousemove', handleMove, { passive: false });
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        // 绑定触摸事件（适配手机/平板）
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd);
        canvas.addEventListener('touchcancel', handleEnd);

        // 初始化绘制
        draw();
    </script>
</body>
</html>
