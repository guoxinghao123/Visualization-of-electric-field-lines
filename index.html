<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>动态变量电荷电场线示意图</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 15px;
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
            text-align: center;
            font-size: 24px;
        }
        .hint {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .controls {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px; 
        }
        button {
            padding: 10px 15px;
            margin: 0; 
            font-size: 15px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s;
            user-select: none; 
            -webkit-user-select: none; 
        }
        button:hover {
            background-color: #0056b3;
        }
        button.active {
            background-color: #28a745;
        }

        /* 【新增】控制滑块区域样式 */
        .sliders-container {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 15px;
            color: #444;
        }
        .slider-row input[type="range"] {
            flex: 1;
            margin: 0 15px;
            cursor: pointer;
        }
        .slider-row .val-tag {
            font-weight: bold;
            width: 45px;
            text-align: right;
        }

        canvas {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(26, 24, 24, 0.1);
            cursor: default;
            max-width: 100%;
            height: auto;
            touch-action: none; 
        }
        .footer {
            margin-top: 30px; 
            margin-bottom: 10px;
            text-align: center;
        }
        .footer a {
            color: #007bff;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 20px;
            border: 2px solid #007bff;
            border-radius: 20px;
            transition: all 0.3s ease;
            display: inline-block; 
        }
        .footer a:hover {
            background-color: #007bff;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
        }
        h5 {
            margin-top: 10px;
        }
        h5 a {
            color: #555;
            text-decoration: none;
        }
        h5 a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>等量/变量电荷电场线演示</h1>
    <div class="hint">💡 提示：可通过按钮预设或<b>手动调节滑块</b>改变电量，支持<b>左右拖拽</b>电荷。</div>
    
    <div class="controls">
        <button id="btn-dipole" class="active" onclick="setMode('dipole')">正负点电荷</button>
        <button id="btn-pospos" onclick="setMode('pospos')">正正点电荷</button>
        <button id="btn-negneg" onclick="setMode('negneg')">负负点电荷</button>
    </div>

    <div class="sliders-container">
        <div class="slider-row">
            <span>左电荷电量 (q₁):</span>
            <input type="range" id="slide-q1" min="-3" max="3" step="1" value="1">
            <span id="val-q1" class="val-tag">+1</span>
        </div>
        <div class="slider-row">
            <span>右电荷电量 (q₂):</span>
            <input type="range" id="slide-q2" min="-3" max="3" step="1" value="-1">
            <span id="val-q2" class="val-tag">-1</span>
        </div>
    </div>

    <canvas id="simCanvas" width="800" height="500"></canvas>
    
    <div class="footer">
        <a href="https://github.com/guoxinghao123/Visualization-of-electric-field-lines" target="_blank">点击查看本页源代码</a>
    </div>
    <h3>
        <a href="https://github.com/guoxinghao123" target="_blank">@计算机科学与技术2025级 郭兴昊</a>
    </h3>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        const chargeDist = 200; 
        const k = 10000; 
        const stepSize = 3; 
        const baseLines = 12; // 【修改】每1单位电量对应发射12条电场线
        const chargeRadius = 15; 

        // 初始状态
        let q1 = { x: width/2 - chargeDist/2, y: height/2, q: 1 };
        let q2 = { x: width/2 + chargeDist/2, y: height/2, q: -1 };
        
        let draggingElement = null; 

        // 按钮快捷预设
        function setMode(preset) {
            if (preset === 'dipole') { q1.q = 1; q2.q = -1; } 
            else if (preset === 'pospos') { q1.q = 1; q2.q = 1; } 
            else if (preset === 'negneg') { q1.q = -1; q2.q = -1; }
            
            updateSliderUI();
            checkActiveButton();
            draw();
        }

        // 更新滑块的数值显示
        function updateSliderUI() {
            document.getElementById('slide-q1').value = q1.q;
            document.getElementById('slide-q2').value = q2.q;
            document.getElementById('val-q1').innerText = (q1.q > 0 ? "+" : "") + q1.q;
            document.getElementById('val-q2').innerText = (q2.q > 0 ? "+" : "") + q2.q;
        }

        // 检查并高亮对应的预设按钮
        function checkActiveButton() {
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            if (q1.q === 1 && q2.q === -1) document.getElementById('btn-dipole').classList.add('active');
            else if (q1.q === 1 && q2.q === 1) document.getElementById('btn-pospos').classList.add('active');
            else if (q1.q === -1 && q2.q === -1) document.getElementById('btn-negneg').classList.add('active');
        }

        // 计算某一点的电场强度 (Ex, Ey)
        function getE(x, y) {
            let Ex = 0, Ey = 0;
            const charges = [q1, q2];

            for (let c of charges) {
                if (c.q === 0) continue; // 电量为0不产生电场
                let dx = x - c.x;
                let dy = y - c.y;
                let r2 = dx*dx + dy*dy;
                if (r2 < 1) r2 = 1; 
                let r = Math.sqrt(r2);
                let E = (k * c.q) / r2;
                Ex += E * (dx / r);
                Ey += E * (dy / r);
            }
            return { Ex, Ey };
        }

        function drawArrow(x, y, Ex, Ey, color) {
            const angle = Math.atan2(Ey, Ex);
            const arrowLen = 10;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - arrowLen * Math.cos(angle - Math.PI / 6), y - arrowLen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x - arrowLen * Math.cos(angle + Math.PI / 6), y - arrowLen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawAxis() {
            ctx.beginPath();
            ctx.moveTo(0, height / 2); 
            ctx.lineTo(width, height / 2); 
            ctx.strokeStyle = "#FFC107"; 
            ctx.lineWidth = 2; 
            ctx.setLineDash([8, 8]); 
            ctx.stroke();
            ctx.setLineDash([]); 
        }

        function drawFieldLines() {
            ctx.strokeStyle = "#999999"; 
            ctx.lineWidth = 1.5;

            const charges = [q1, q2];
            
            // 判断是否为同种电荷
            let isSameSign = (q1.q * q2.q > 0);
            
            // 【高级物理修正】：如果电量不同，中性点（空气墙）会根据电量平方根比例偏向较小电荷
            let neutralX = (q1.x + q2.x) / 2; 
            if (isSameSign && q1.q !== 0 && q2.q !== 0) {
                let sq1 = Math.sqrt(Math.abs(q1.q));
                let sq2 = Math.sqrt(Math.abs(q2.q));
                neutralX = (q1.x * sq2 + q2.x * sq1) / (sq1 + sq2);
            }
            
            for (let c of charges) {
                if (c.q === 0) continue; // 不带电则不绘制电场线
                
                let reverse = (c.q < 0);
                let isLeftCharge = c.x < (q1.x + q2.x)/2;
                
                // 动态计算该电荷生成的电场线总数
                let numLines = Math.abs(c.q) * baseLines;
                let angleOffset = isSameSign ? (Math.PI / numLines) : 0;

                for (let i = 0; i < numLines; i++) {
                    let angle = (i * 2 * Math.PI) / numLines + angleOffset;
                    let x = c.x + Math.cos(angle) * 10; 
                    let y = c.y + Math.sin(angle) * 10;

                    ctx.beginPath();
                    ctx.moveTo(x, y);

                    let stepCount = 0;
                    let arrowDrawn = false;

                    while (x > 0 && x < width && y > 0 && y < height && stepCount < 1500) {
                        let { Ex, Ey } = getE(x, y);
                        let E_mag = Math.sqrt(Ex*Ex + Ey*Ey);
                        if (E_mag < 0.01) break; // 电场极弱处停止
                        
                        let dx = (Ex / E_mag) * stepSize;
                        let dy = (Ey / E_mag) * stepSize;

                        if (reverse) { dx = -dx; dy = -dy; }

                        x += dx;
                        y += dy;

                        // 同种电荷动态空气墙阻挡
                        if (isSameSign) {
                            if (isLeftCharge && x >= neutralX) break;  
                            if (!isLeftCharge && x <= neutralX) break; 
                        }

                        ctx.lineTo(x, y);

                        let hitCharge = false;
                        for (let other_c of charges) {
                            if (c !== other_c && other_c.q !== 0) { 
                                let dist = Math.sqrt((x - other_c.x)**2 + (y - other_c.y)**2);
                                if (dist < chargeRadius) { hitCharge = true; break; }
                            }
                        }
                        if (hitCharge) break;

                        if (stepCount === 40 && !arrowDrawn) {
                            ctx.stroke(); 
                            drawArrow(x, y, Ex, Ey, "#999999");
                            ctx.beginPath();
                            ctx.moveTo(x, y);
                            arrowDrawn = true;
                        }

                        stepCount++;
                    }
                    ctx.stroke();
                }
            }
        }

        function drawCharge(c) {
            ctx.beginPath();
            ctx.arc(c.x, c.y, chargeRadius, 0, 2 * Math.PI);
            
            // 根据正负电量着色，电量为0时显示灰色
            if (c.q > 0) ctx.fillStyle = "#ff4d4d";
            else if (c.q < 0) ctx.fillStyle = "#4da6ff";
            else ctx.fillStyle = "#bbb"; 
            
            ctx.fill();
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            let symbol = "0";
            if (c.q > 0) symbol = "+";
            else if (c.q < 0) symbol = "-";
            ctx.fillText(symbol, c.x, c.y + 2);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            drawAxis(); 
            drawFieldLines();
            drawCharge(q1);
            drawCharge(q2);
        }

        // --- 滑动条事件绑定 ---
        document.getElementById('slide-q1').addEventListener('input', function(e) {
            q1.q = parseInt(e.target.value);
            document.getElementById('val-q1').innerText = (q1.q > 0 ? "+" : "") + q1.q;
            checkActiveButton();
            draw();
        });

        document.getElementById('slide-q2').addEventListener('input', function(e) {
            q2.q = parseInt(e.target.value);
            document.getElementById('val-q2').innerText = (q2.q > 0 ? "+" : "") + q2.q;
            checkActiveButton();
            draw();
        });

        // --- 鼠标与触摸交互事件 ---
        function getEventPos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;

            if (evt.touches && evt.touches.length > 0) {
                clientX = evt.touches[0].clientX;
                clientY = evt.touches[0].clientY;
            } else if (evt.changedTouches && evt.changedTouches.length > 0) {
                clientX = evt.changedTouches[0].clientX;
                clientY = evt.changedTouches[0].clientY;
            } else {
                clientX = evt.clientX;
                clientY = evt.clientY;
            }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function handleStart(evt) {
            evt.preventDefault(); 
            const pos = getEventPos(evt);
            const hitbox = chargeRadius + 20; 

            if (Math.hypot(pos.x - q1.x, pos.y - q1.y) < hitbox) {
                draggingElement = q1;
                canvas.style.cursor = 'grabbing';
            } else if (Math.hypot(pos.x - q2.x, pos.y - q2.y) < hitbox) {
                draggingElement = q2;
                canvas.style.cursor = 'grabbing';
            }
        }

        function handleMove(evt) {
            evt.preventDefault(); 
            const pos = getEventPos(evt);

            if (draggingElement) {
                let newX = pos.x;
                if (newX < chargeRadius) newX = chargeRadius;
                if (newX > width - chargeRadius) newX = width - chargeRadius;
                draggingElement.x = newX;
                requestAnimationFrame(draw); 
            } else if (!evt.touches) { 
                const hitbox = chargeRadius + 10;
                if (Math.hypot(pos.x - q1.x, pos.y - q1.y) < hitbox || 
                    Math.hypot(pos.x - q2.x, pos.y - q2.y) < hitbox) {
                    canvas.style.cursor = 'grab';
                } else {
                    canvas.style.cursor = 'default';
                }
            }
        }

        function handleEnd(evt) {
            evt.preventDefault();
            draggingElement = null;
            canvas.style.cursor = 'default';
        }

        canvas.addEventListener('mousedown', handleStart, { passive: false });
        canvas.addEventListener('mousemove', handleMove, { passive: false });
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd);
        canvas.addEventListener('touchcancel', handleEnd);

        // 初始化
        draw();
    </script>
</body>
</html>
